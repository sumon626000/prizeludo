<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06160f" />
    <title>PrizeJito.com - Offline</title>
    <style>
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #effff3;
        font-family: system-ui, sans-serif;
        text-align: center;
        background:
          radial-gradient(circle at 20% 10%, #176b3a 0, transparent 35%),
          radial-gradient(circle at 80% 90%, #0d542e 0, transparent 35%),
          #020a06;
      }
      main {
        width: min(360px, 100%);
        padding: 30px 24px;
        border: 1px solid rgba(127, 255, 164, 0.22);
        border-radius: 28px;
        background: rgba(5, 31, 18, 0.86);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      }
      img { width: 82px; height: 82px; }
      h1 { margin: 18px 0 8px; font-size: 1.45rem; }
      p { margin: 0 0 22px; color: rgba(232, 255, 239, 0.68); line-height: 1.5; }
      button {
        min-height: 44px;
        border: 0;
        border-radius: 14px;
        padding: 0 22px;
        color: #03200e;
        font-weight: 800;
        background: linear-gradient(135deg, #8af5a7, #3edb74);
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/prizejito-logo.png" alt="PrizeJito.com" />
      <h1>আপনি অফলাইনে আছেন</h1>
      <p>ইন্টারনেট সংযোগ ফিরে এলে আবার চেষ্টা করুন।</p>
      <button onclick="location.reload()">আবার চেষ্টা করুন</button>
    </main>
  </body>
</html>
