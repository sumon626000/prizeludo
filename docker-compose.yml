services:
  postgres:
    image: postgres:17-alpine
    container_name: khan-ludo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: khan_ludo
      POSTGRES_USER: khan_ludo
      POSTGRES_PASSWORD: khan_ludo
    ports:
      - "5432:5432"
    volumes:
      - khan_ludo_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khan_ludo -d khan_ludo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  khan_ludo_postgres:

